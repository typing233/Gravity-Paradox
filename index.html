<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Paradox - 重力悖论</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="header">
            <h1>Gravity Paradox</h1>
            <h2>重力悖论</h2>
            <div id="score-panel">
                <div class="score-item">
                    <span class="label">分数</span>
                    <span id="score">0</span>
                </div>
                <div class="score-item">
                    <span class="label">等级</span>
                    <span id="level">1</span>
                </div>
                <div class="score-item">
                    <span class="label">行数</span>
                    <span id="lines">0</span>
                </div>
            </div>
        </div>
        
        <div id="game-boards">
            <div class="board-container" id="left-board">
                <div class="board-header">
                    <h3>左侧区域</h3>
                    <span class="gravity-indicator">↓ 向下重力</span>
                </div>
                <div class="board-wrapper">
                    <canvas id="board-left" width="300" height="600"></canvas>
                    <canvas id="effects-left" width="300" height="600" class="effects-layer"></canvas>
                </div>
                <div class="next-piece">
                    <h4>下一个</h4>
                    <canvas id="next-left" width="120" height="120"></canvas>
                </div>
            </div>
            
            <div id="center-panel">
                <div id="sync-indicator">
                    <div class="sync-status" id="sync-status">准备就绪</div>
                    <div class="sync-timer" id="sync-timer"></div>
                </div>
                
                <div id="controls-info">
                    <h3>操作说明</h3>
                    <div class="control-item">
                        <span class="key">←</span>
                        <span class="action">左侧右移 / 右侧左移</span>
                    </div>
                    <div class="control-item">
                        <span class="key">→</span>
                        <span class="action">左侧左移 / 右侧右移</span>
                    </div>
                    <div class="control-item">
                        <span class="key">↑</span>
                        <span class="action">旋转 (镜像)</span>
                    </div>
                    <div class="control-item">
                        <span class="key">↓</span>
                        <span class="action">加速下落</span>
                    </div>
                    <div class="control-item">
                        <span class="key">空格</span>
                        <span class="action">瞬间下落</span>
                    </div>
                    <div class="control-item">
                        <span class="key">P</span>
                        <span class="action">暂停</span>
                    </div>
                    <div class="control-item">
                        <span class="key">R</span>
                        <span class="action">重新开始</span>
                    </div>
                </div>
                
                <button id="start-btn">开始游戏</button>
            </div>
            
            <div class="board-container" id="right-board">
                <div class="board-header">
                    <h3>右侧区域</h3>
                    <span class="gravity-indicator">↑ 向上重力</span>
                </div>
                <div class="board-wrapper">
                    <canvas id="board-right" width="300" height="600"></canvas>
                    <canvas id="effects-right" width="300" height="600" class="effects-layer"></canvas>
                </div>
                <div class="next-piece">
                    <h4>下一个</h4>
                    <canvas id="next-right" width="120" height="120"></canvas>
                </div>
            </div>
        </div>
        
        <div id="game-over" class="hidden">
            <div class="game-over-content">
                <h2 id="game-over-title">游戏结束</h2>
                <p id="game-over-score">最终分数: <span>0</span></p>
                <button id="restart-btn">重新开始</button>
            </div>
        </div>
        
        <div id="sync-effect" class="hidden">
            <div class="sync-effect-content">
                <h2>同步消除!</h2>
                <p>全屏清空</p>
                <p class="bonus">+10000 分</p>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
